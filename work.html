<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H+H — Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E8380D;--black:#0a0a0a;--off:#F7F4F0;}
html{scroll-behavior:smooth;}
body{font-family:'Syne',sans-serif;background:var(--off);color:var(--black);cursor:none;overflow-x:hidden;}
#curDot,#curRing{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;}
#curDot{width:8px;height:8px;background:currentColor;transform:translate(-50%,-50%);top:0;left:0;}
#curRing{width:36px;height:36px;border:1.5px solid currentColor;transform:translate(-50%,-50%);top:0;left:0;transition:width .3s,height .3s;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:28px 48px;}
.nlogo{font-size:13px;font-weight:500;letter-spacing:.08em;color:var(--black);text-decoration:none;}
.nback{font-size:14px;font-weight:400;letter-spacing:.04em;color:var(--black);text-decoration:none;opacity:.6;transition:opacity .3s;}
.nback:hover{opacity:1;}
nav.dark .nlogo,nav.dark .nback{color:var(--off);}
.wh{height:100vh;background:var(--black);display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 64px;position:relative;overflow:hidden;}
.wh-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.4;}
.wh-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.5;}
.wh-meta{display:flex;gap:40px;margin-bottom:32px;opacity:.6;position:relative;}
.wh-meta span{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--off);}
.wh-title{font-size:clamp(64px,11vw,160px);font-weight:400;color:var(--off);line-height:.92;letter-spacing:-.045em;text-transform:uppercase;position:relative;}
.wi{padding:120px 48px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;background:var(--off);}
.wi-desc{font-size:clamp(20px,2.8vw,38px);font-weight:400;line-height:1.25;letter-spacing:-.02em;}
.wi-details{display:flex;flex-direction:column;gap:32px;padding-top:8px;}
.wi-detail-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.4;margin-bottom:8px;}
.wi-detail-value{font-size:15px;font-weight:400;line-height:1.6;}
.ws{padding:80px 48px;background:var(--off);}
.ws-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;opacity:.4;margin-bottom:24px;}
.ws-text{font-size:clamp(18px,2.2vw,28px);font-weight:400;line-height:1.5;letter-spacing:-.01em;max-width:800px;}
.wdiv{height:1px;background:rgba(0,0,0,.1);margin:0 48px;}
.wgallery{background:var(--black);padding:4px 0;}
.wgallery-grid{display:flex;flex-direction:column;gap:4px;}
.wgallery-row{display:grid;gap:4px;}
.wgallery-row.single{grid-template-columns:1fr;}
.wgallery-row.double{grid-template-columns:1fr 1fr;}
.wgallery-row.triple{grid-template-columns:1fr 1fr 1fr;}
.wgallery-row img,.wgallery-row video{width:100%;display:block;object-fit:cover;aspect-ratio:4/3;}
.wgallery-row.single img,.wgallery-row.single video{aspect-ratio:16/9;}
.wgallery-row video{background:#000;}
.wnext{background:var(--black);padding:120px 48px;border-top:1px solid rgba(255,255,255,.08);}
.wnext-label{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--off);opacity:.4;margin-bottom:60px;}
.wnext-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.wnext-item a{display:block;text-decoration:none;position:relative;overflow:hidden;}
.wnext-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:brightness(.5);transition:filter .6s;}
.wnext-item:hover .wnext-img{filter:brightness(.75);}
.wnext-info{position:absolute;bottom:0;left:0;right:0;padding:32px;background:linear-gradient(transparent,rgba(0,0,0,.7));}
.wnext-name{font-size:clamp(20px,3vw,36px);font-weight:400;color:var(--off);letter-spacing:-.03em;text-transform:uppercase;line-height:1;}
.wnext-type{font-size:12px;color:var(--off);opacity:.6;margin-top:8px;letter-spacing:.06em;}
footer{background:var(--black);padding:40px 48px;border-top:1px solid rgba(255,255,255,.08);}
.footer-inner{display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-size:12px;color:var(--off);opacity:.4;letter-spacing:.06em;}
.footer-back{font-size:12px;color:var(--off);opacity:.6;text-decoration:none;letter-spacing:.06em;transition:opacity .3s;}
.footer-back:hover{opacity:1;}
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .9s,transform .9s cubic-bezier(.16,1,.3,1);}
.fade-up.vis{opacity:1;transform:none;}
@media(max-width:768px){
  nav{padding:20px 24px;}
  .wh{padding:0 24px 48px;}
  .wi{grid-template-columns:1fr;padding:60px 24px;gap:40px;}
  .ws{padding:60px 24px;}
  .wdiv{margin:0 24px;}
  .wnext{padding:60px 24px;}
  .wnext-grid{grid-template-columns:1fr;}
  footer{padding:32px 24px;}
}
</style>
</head>
<body>

<div id="curRing"></div>
<nav id="nav">
  <a href="/" class="nlogo">H+H</a>

function renderMedia(item,folder){
  if(item.kind==='vid'){
    return `<video autoplay muted loop playsinline><source src="images/works/${item.src}" type="video/mp4"></video>`;
  }
  const srcs=[item.src,item.src2,item.src3].filter(Boolean);
  return srcs.map(s=>`<img src="images/works/${s}" alt="" loading="lazy">`).join('');
}

const slug=new URLSearchParams(location.search).get('p');
const project=PROJECTS[slug];
if(!project){
  document.getElementById('main').innerHTML='<div style="padding:200px 48px;text-align:center"><p style="font-size:24px">Project not found. <a href="/">← Back home</a></p></div>';
}else{
  document.title='H+H — '+project.title.replace('\n',' ');
  const nextProjects=Object.entries(PROJECTS).filter(([k])=>k!==slug).slice(0,2);
  const mediaRows=project.media.map(item=>`<div class="wgallery-row ${item.type} fade-up">${renderMedia(item)}</div>`).join('');
  const nextItems=nextProjects.map(([k,p])=>`<div class="wnext-item"><a href="work.html?p=${k}"><img class="wnext-img" src="${p.heroImg}" alt="${p.title}"><div class="wnext-info"><div class="wnext-name">${p.title.replace('\n','<br>')}</div><div class="wnext-type">${p.type}</div></div></a></div>`).join('');
  document.getElementById('main').innerHTML=
    `<section class="wh"><div class="wh-bg" style="background-image:url('${project.heroImg}')"></div><div class="wh-meta"><span>${project.type}</span><span>${project.year}</span></div><h1 class="wh-title">${project.title.replace('\n','<br>')}</h1></section>
    <section class="wi"><p class="wi-desc fade-up">${project.description}</p><div class="wi-details fade-up"><div class="wi-detail-block"><div class="wi-detail-label">Delivered</div><div class="wi-detail-value">${project.delivered.join('<br>')}</div></div><div class="wi-detail-block"><div class="wi-detail-label">Year</div><div class="wi-detail-value">${project.year}</div></div><div class="wi-detail-block"><div class="wi-detail-label">Category</div><div class="wi-detail-value">${project.type}</div></div></div></section>
    <div class="wdiv"></div>
    <section class="ws"><div class="ws-label">The Challenge</div><p class="ws-text fade-up">${project.challenge}</p></section>
    <div class="wdiv"></div>
    <section class="ws"><div class="ws-label">The Outcome</div><p class="ws-text fade-up">${project.outcome}</p></section>
    <section class="wgallery"><div class="wgallery-grid">${mediaRows}</div></section>
    <section class="wnext"><div class="wnext-label">View Another Project</div><div class="wnext-grid">${nextItems}</div></section>
    <footer><div class="footer-inner"><span class="footer-copy">H+H © 2024</span><a href="/" class="footer-back">← Back to home</a></div></footer>`;
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});},{threshold:0.05});
  document.querySelectorAll('.fade-up').forEach(el=>obs.observe(el));
}

const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>{nav.classList.toggle('dark',window.scrollY<window.innerHeight*.8);},{passive:true});
nav.classList.add('dark');

const dot=document.getElementById('curDot'),ring=document.getElementById('curRing');
let mx=-100,my=-100,rx=-100,ry=-100,ca=false;
dot.style.color='#E8380D'; ring.style.color='#E8380D';
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(!ca){ca=true;dot.style.opacity='1';ring.style.opacity='1';}});
function updateCursorColor(){
  let el=document.elementFromPoint(mx,my);
  let bg='rgba(0,0,0,0)';
  while(el&&el!==document.body){bg=window.getComputedStyle(el).backgroundColor;if(bg&&bg!=='rgba(0,0,0,0)'&&bg!=='transparent')break;el=el.parentElement;}
  if(!bg||bg==='rgba(0,0,0,0)')bg=window.getComputedStyle(document.body).backgroundColor;
  const m=bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  const isRed=m&&parseInt(m[1])>180&&parseInt(m[2])<100&&parseInt(m[3])<80;
  dot.style.color=isRed?'#F7F4F0':'#E8380D';
  ring.style.color=isRed?'#F7F4F0':'#E8380D';
}
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;dot.style.left=mx+'px';dot.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';updateCursorColor();requestAnimationFrame(loop);})();
</script>

</html>
